<!DOCTYPE html>
<html>
<head>
  <title>My Todo App</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 70%;
      padding: 8px;
    }

    button {
      padding: 8px;
      cursor: pointer;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 5px;
    }

    li {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      background: #f1f1f1;
      padding: 5px;
      border-radius: 5px;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>✨ My Todo App</h2>

  <input type="text" id="task" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="list"></ul>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function showTasks() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      let li = document.createElement("li");
      li.innerHTML = task + 
      ` <button class="delete" onclick="deleteTask(${index})">X</button>`;
      list.appendChild(li);
    });
  }

  function addTask() {
    let task = document.getElementById("task").value;
    if (task === "") return;

    tasks.push(task);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    document.getElementById("task").value = "";

    showTasks();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    showTasks();
  }

  showTasks();
</script>

</body>
</html>
