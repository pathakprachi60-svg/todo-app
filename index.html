<!DOCTYPE html>
<html>
<head>
  <title>My Todo App</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient (135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  .container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
  }

  .input-box {
    display: flex;
    gap: 8px;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  button {
    padding: 10px;
    border: none;
    background: #667eea;
    color: white;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
  }

  ul {
    padding: 0;
    margin-top: 15px;
  }

  li {
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    background: #f1f1f1;
    padding: 10px;
    border-radius: 8px;
    font-size: 15px;
  }

  li div {
    display: flex;
    gap: 5px;
  }

  .delete {
    background: red;
  }
</style>
  </style>
</head>

<body>

<div class="container">
  <h2>✨ My Todo App</h2>
<div class="input-box">
  <input type="text" id="task" placeholder="Enter task">
  <button onclick="addTask()">Add</button>
</div>
  <ul id="list"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function showTasks() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      let li = document.createElement("li");

      li.innerHTML = `
        ${task}
        <div>
          <button onclick="editTask(${index})">✏️</button>
          <button class="delete" onclick="deleteTask(${index})">X</button>
        </div>
      `;

      list.appendChild(li);
    });
  }

  function addTask() {
    let task = document.getElementById("task").value;
    if (task === "") return;

    tasks.push(task);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    document.getElementById("task").value = "";

    showTasks();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    showTasks();
  }

  function editTask(index) {
    let newTask = prompt("Edit your task:", tasks[index]);

    if (newTask !== null && newTask.trim() !== "") {
      tasks[index] = newTask;
      localStorage.setItem("tasks", JSON.stringify(tasks));
      showTasks();
    }
  }

  showTasks();
</script>
</body>
</html>
